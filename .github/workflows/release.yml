# Release workflow - builds fresh for all platforms and creates a GitHub Release
# Stripped down from upstream: no publishing (Homebrew, npm, AUR, crates.io, Winget)

name: Release
permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Extract version info
  plan:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      publishing: ${{ steps.version.outputs.publishing }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract version info
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "publishing=true" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION"
          echo "Tag: $TAG"
          echo "Is prerelease: $IS_PRERELEASE"

  # Build binaries for each platform
  build:
    needs: plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive_ext: tar.xz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive_ext: tar.xz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15
            archive_ext: tar.xz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.xz
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive_ext: zip
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.plan.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.cross && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ] && [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          if [[ "${{ matrix.target }}" == *-pc-windows-msvc ]]; then
            export RUSTFLAGS="-C target-feature=+crt-static"
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE_NAME="fresh-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp target/${{ matrix.target }}/release/fresh "${ARCHIVE_NAME}/"
          cp README.md LICENSE CHANGELOG.md "${ARCHIVE_NAME}/"

          if [[ "${{ matrix.target }}" == *-linux-* ]]; then
            cp -r docs/icons/linux/hicolor "${ARCHIVE_NAME}/icons"
            cp crates/fresh-editor/resources/fresh.desktop "${ARCHIVE_NAME}/fresh.desktop"
          fi

          if [ "${{ matrix.archive_ext }}" = "tar.xz" ]; then
            tar -cJvf "${ARCHIVE_NAME}.tar.xz" "${ARCHIVE_NAME}"
            sha256sum "${ARCHIVE_NAME}.tar.xz" > "${ARCHIVE_NAME}.tar.xz.sha256"
          else
            tar -czvf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
            sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          fi

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ARCHIVE_NAME = "fresh-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $ARCHIVE_NAME -Force
          Copy-Item "target/${{ matrix.target }}/release/fresh.exe" "$ARCHIVE_NAME/"
          Copy-Item "README.md", "LICENSE", "CHANGELOG.md" "$ARCHIVE_NAME/"

          Compress-Archive -Path "$ARCHIVE_NAME/*" -DestinationPath "$ARCHIVE_NAME.zip"
          $hash = (Get-FileHash "$ARCHIVE_NAME.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $ARCHIVE_NAME.zip" | Out-File -Encoding ASCII "$ARCHIVE_NAME.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            fresh-${{ matrix.target }}.${{ matrix.archive_ext }}
            fresh-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256

  # Create GitHub Release
  release:
    needs: [plan, build]
    if: ${{ !cancelled() && !failure() && needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.plan.outputs.version }}
      TAG: ${{ needs.plan.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create source tarball
        run: |
          TARBALL_NAME="fresh-${VERSION}-source.tar.gz"
          git archive --format=tar.gz --prefix="fresh-${VERSION}/" -o "artifacts/${TARBALL_NAME}" HEAD
          cd artifacts
          sha256sum "${TARBALL_NAME}" > "${TARBALL_NAME}.sha256"
          cd ..
          echo "Created source tarball:"
          ls -la "artifacts/${TARBALL_NAME}"
          cat "artifacts/${TARBALL_NAME}.sha256"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.plan.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## [0-9]/ {
              if (found) exit
              if ($2 == ver) found=1
            }
            /^---$/ { if (found) exit }
            found { print }
          ' CHANGELOG.md > release_notes.md || echo "Release ${VERSION}" > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${VERSION}" > release_notes.md
          fi
          cat release_notes.md

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.plan.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            $PRERELEASE_FLAG \
            --title "fresh ${VERSION}" \
            --notes-file release_notes.md \
            artifacts/*.tar.xz \
            artifacts/*.tar.xz.sha256 \
            artifacts/*.tar.gz \
            artifacts/*.tar.gz.sha256 \
            artifacts/*.zip \
            artifacts/*.zip.sha256 \
            2>/dev/null || true
